name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="/home/tdapp/app"

            echo "=== Pulling latest ==="
            su - tdapp -c "cd $APP_DIR && git pull origin main"

            echo "=== Installing deps ==="
            su - tdapp -c "cd $APP_DIR && npm ci --production=false"

            echo "=== Building frontend ==="
            su - tdapp -c "cd $APP_DIR && npm run build"

            echo "=== Restarting backend ==="
            systemctl restart td-backend

            echo "=== Health check ==="
            healthy=0
            for attempt in $(seq 1 15); do
              if curl -fsS http://localhost:3003/api/health >/dev/null; then
                healthy=1
                break
              fi
              sleep 2
            done
            if [ "$healthy" -ne 1 ]; then
              echo "Health check failed after retries"
              journalctl -u td-backend --no-pager -n 50 || true
              exit 1
            fi

            echo "Deployed at $(date)"
