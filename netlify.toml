[build]
  # Build command
  command = "npm run build"

  # Output directory (Vite default)
  publish = "dist"

  # Node version
  environment = { NODE_VERSION = "18" }

# Redirect all routes to index.html for client-side routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Build plugins (optional)
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  # Lighthouse plugin config (optional - monitors performance)
  [plugins.inputs]
    output_path = "reports/lighthouse.html"
